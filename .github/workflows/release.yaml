name: Release

on:
  release:
    types: [ published ]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Install dependencies
        run: deno install --frozen

      - name: Type check
        run: deno check

      - name: Set version from release tag
        run: |
          sed -i 's/"version": "[^"]*"/"version": "${{ github.event.release.tag_name }}"/' deno.json

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/altmanager/altmanager-ws
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !github.event.release.prerelease }}
            type=semver,pattern={{major}},enable=${{ !github.event.release.prerelease }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}
            type=raw,value=rc,enable=${{ github.event.release.prerelease }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Build release binaries
        run: deno task "compile:*"

      - name: Upload release binaries
        uses: cloudnode-pro/release-upload-asset@v1
        with:
          gh-token: ${{ github.token }}
          files: |-
            bin/altmanager-ws-aarch64-unknown-linux-gnu; type=application/x-pie-executable
            bin/altmanager-ws-x86_64-unknown-linux-gnu; type=application/x-pie-executable
            bin/altmanager-ws-aarch64-apple-darwin; type=application/x-mach-binary
            bin/altmanager-ws-x86_64-apple-darwin; type=application/x-mach-binary
            bin/altmanager-ws-x86_64-pc-windows-msvc.exe; type=application/vnd.microsoft.portable-executable
